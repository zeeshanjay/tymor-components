<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tymor Technologies - Interactive</title>
  
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      margin: 0;
      padding: 0;
    }

    div {
      position: absolute;
      box-sizing: border-box;
    }

    .container {
      width: 300px;
      height: 300px;
      perspective: 1500px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #cube {
      height: 100%;
      width: 100%;
      transform-style: preserve-3d;
    }

    .face {
      height: 100%;
      width: 100%;
      user-select: none;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="cube">
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
      <div class="face"></div>
    </div>
  </div>

  <script>
    let rots = [ 
      { ry: 0,   rx: 0  }, // 1
      { ry: 90,  rx: 0  }, // 2
      { ry: 180, rx: 0  }, // 3
      { ry: 270, rx: 0  }, // 4
      { ry: 0,   rx: 90 }, // 5
      { ry: 0,   rx:-90 }  // 6
    ];

    const cube = document.getElementById("cube");

    gsap.timeline()
      .set(".face", { // apply transform rotations to each face of the cube
        rotateY: (i) => rots[i].ry,
        rotateX: (i) => rots[i].rx,
        transformOrigin: "50% 50% -150px",
        z: 150,
        background: (i) => {
          const images = ['holobox.png', 'holobox3d.png', 'holoboxing.png', 'img.png', 'img2.png', 'newimg.png'];
          return 'url('+images[i]+') center/cover';
        }
      })
      // .from(cube, { // reveal
      //   scale:2,
      //   border:'solid black 300px',
      //   ease:'expoInOut'
      // })
      .add(function(){
        window.onmousemove = (e) => { // make it respond to mouse position
          
          let winPercent = { x: e.clientX/innerWidth, y: e.clientY/innerHeight },
              distFromCenter = 1 - Math.abs( (e.clientX - innerWidth/2) / innerWidth*2 );

          gsap.to(cube, {
            duration: 1,
            rotationX: -180+360*winPercent.y,
            rotationY: -180+360*winPercent.x
          });
          
          gsap.to('.face', {
            duration: 1,
            backgroundPosition: -150+150*winPercent.x+'px '+(-150*winPercent.y)+'px'
          });
        }  
      });
  </script>
</body>
</html>
